<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Cancha deportiva para demo operativa</title>
  <desc id="desc">Ilustracion local versionada con cancha, marcadores y elementos deportivos.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="0.48" stop-color="#0e7490"/>
      <stop offset="1" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="field" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#0a6e5a"/>
      <stop offset="0.5" stop-color="#15803d"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <radialGradient id="light" cx="50%" cy="20%" r="65%">
